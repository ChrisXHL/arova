<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Arova — Follow the thread.</title>
<link rel="stylesheet" href="/vendor/xterm.css" />
<style>
  /* Codex 设计系统落地：高对比极简，留白代分隔，仅 hover 出阴影，字重≤600，按钮药丸。
     跟随系统明暗——暗色为基（终端应用主场），亮色经 prefers-color-scheme 切换。 */
  :root {
    /* 暗色令牌（Codex §2.4 #212121 系） */
    --bg: #212121; --panel: #262626; --raised: #2e2e2e; --input: #2a2a2a;
    --line: rgba(255,255,255,0.11); --line-soft: rgba(255,255,255,0.06);
    --t1: #ffffff; --t2: #c1c1c1; --t3: #8e8ea0; --t4: #6b6b72;
    --elev-hover: rgba(0,0,0,0.30) 0 3px 6px 0, rgba(0,0,0,0.20) 0 4px 40px 4px;
    /* 圆角（Codex §6：按钮药丸，卡片近零建筑感） */
    --r1: 6px; --r2: 8px; --r3: 12px; --pill: 9999px;
    /* 动效（Codex §9） */
    --motion: 200ms; --ease: cubic-bezier(0.16, 1, 0.3, 1);
    /* 字体（Codex §3：产品 UI 独占 OpenAI Sans，回退系统栈；连字+上下文替换） */
    --sans: "OpenAI Sans", -apple-system, "SF Pro Text", "PingFang SC", system-ui, sans-serif;
    --mono: "SF Mono", "JetBrains Mono", ui-monospace, monospace;
  }
  /* 亮色令牌（Codex §2：纸白画布 + 黑字 + 半透明黑发丝线）。
     跟随系统：无 data-theme 时由 prefers-color-scheme 决定；手动选择写 data-theme 覆盖系统。 */
  @media (prefers-color-scheme: light) {
    :root:not([data-theme]) {
      --bg: #ffffff; --panel: #fafafa; --raised: #f1f1f1; --input: #ffffff;
      --line: rgba(0,0,0,0.12); --line-soft: #ededed;
      --t1: #000000; --t2: #6e6e6e; --t3: #767881; --t4: #8f8f8f;
      --elev-hover: rgba(0,0,0,0.04) 0 3px 6px 0, rgba(0,0,0,0.04) 0 4px 80px 8px;
    }
  }
  :root[data-theme="light"] {
    --bg: #ffffff; --panel: #fafafa; --raised: #f1f1f1; --input: #ffffff;
    --line: rgba(0,0,0,0.12); --line-soft: #ededed;
    --t1: #000000; --t2: #6e6e6e; --t3: #767881; --t4: #8f8f8f;
    --elev-hover: rgba(0,0,0,0.04) 0 3px 6px 0, rgba(0,0,0,0.04) 0 4px 80px 8px;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body { margin: 0; background: var(--bg); color: var(--t1); font-family: var(--sans); font-size: 13px; line-height: 1.5;
         -webkit-font-smoothing: antialiased; font-feature-settings: "liga","kern","calt";
         display: flex; flex-direction: column; overflow: hidden; }
  .mono { font-family: var(--mono); }
  button { font-family: var(--sans); cursor: pointer;
           transition: background-color var(--motion) var(--ease), border-color var(--motion) var(--ease), color var(--motion) var(--ease), transform var(--motion) var(--ease); }

  /* —— 顶栏（就是标题栏：可拖拽）—— */
  .top { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--line); background: var(--panel);
         -webkit-app-region: drag; user-select: none; }
  .top .rechoose, .top button { -webkit-app-region: no-drag; }
  body.electron .top { padding-left: 84px; }
  .top .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .top .brand-mark { display: flex; align-items: center; flex: none; }
  .top .brand-mark img { display: block; width: 74px; height: 28px; }
  .top .brand-mark .logo-light { display: none; }
  @media (prefers-color-scheme: light) {
    :root:not([data-theme]) .top .brand-mark .logo-dark { display: none; }
    :root:not([data-theme]) .top .brand-mark .logo-light { display: block; }
  }
  :root[data-theme="light"] .top .brand-mark .logo-dark { display: none; }
  :root[data-theme="light"] .top .brand-mark .logo-light { display: block; }
  .top .tagline { color: var(--t3); font-size: 11.5px; font-style: italic; letter-spacing: .01em; white-space: nowrap; }
  .top .cwd { color: var(--t3); font-size: 11.5px; font-family: var(--mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 40vw; }
  .top .rechoose { color: var(--t3); font-size: 12px; cursor: pointer; }
  .top .rechoose:hover { color: var(--t1); }
  .top-right { display: flex; align-items: center; gap: 14px; -webkit-app-region: no-drag; }
  .top .life { display: flex; align-items: center; gap: 8px; color: var(--t2); font-size: 12px; white-space: nowrap; }
  .top .life::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--t4); }
  .top .life.on::before { background: var(--t1); }
  #themeBtn { -webkit-app-region: no-drag; background: transparent; border: 1px solid var(--line); color: var(--t3);
              border-radius: var(--pill); width: 30px; height: 26px; font-size: 14px; line-height: 1; padding: 0; }
  #themeBtn:hover { color: var(--t1); border-color: var(--t3); background: var(--raised); }
  #newThreadBtn { -webkit-app-region: no-drag; background: transparent; color: var(--t2); border: 1px solid var(--line);
                  border-radius: var(--pill); padding: 5px 12px; font-size: 12px; }
  #newThreadBtn:hover { color: var(--t1); border-color: var(--t3); background: var(--raised); }
  .thread-frames { flex: 1; min-width: 0; min-height: 0; display: none; }
  .thread-frames.active { display: block; }
  .thread-frame { width: 100%; height: 100%; border: 0; background: var(--bg); display: none; }
  .thread-frame.active { display: block; }
  body.embedded .top, body.embedded .side { display: none; }
  body.embedded .shell { flex: 1; }
  body.embedded .content { width: 100%; }

  /* —— 壳：侧栏 + 内容 —— */
  .shell { flex: 1; display: flex; min-height: 0; }
  .side { width: 228px; flex: none; display: flex; flex-direction: column; background: var(--panel); border-right: 1px solid var(--line); }
  .side-h { display: flex; align-items: center; justify-content: space-between; padding: 14px 14px 8px; color: var(--t3); font-size: 11px; font-weight: 600; letter-spacing: .5px; }
  #addProj { background: transparent; border: 1px solid var(--line); color: var(--t3); border-radius: var(--r1); width: 22px; height: 22px; line-height: 1; font-size: 14px; padding: 0; }
  #addProj:hover { color: var(--t1); border-color: var(--t3); }
  #addRow { padding: 0 10px 8px; }
  #addRow[hidden] { display: none; }
  #addPath { width: 100%; font-family: var(--mono); font-size: 11.5px; color: var(--t1); background: var(--input); border: 1px solid var(--line); border-radius: var(--r1); padding: 7px 9px; outline: none; }
  #addPath:focus { border-color: var(--t3); }
  #addPath::placeholder { color: var(--t4); }
  #projList { flex: 1; overflow-y: auto; padding: 2px 8px 12px; }
  .pgroup { margin-bottom: 14px; }
  .pname { color: var(--t1); font-size: 13px; font-weight: 600; padding: 7px 10px; border-radius: var(--r2);
           border: 1px solid transparent; display: flex; align-items: center; gap: 6px; }
  .pname:hover { background: var(--raised); }
  .pname.sel { background: var(--raised); border-color: var(--line); }
  .pn-label { flex: 1; min-width: 0; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pn-remove { flex: none; color: var(--t4); font-size: 15px; line-height: 1; cursor: pointer; opacity: 0; padding: 0 2px; }
  .pname:hover .pn-remove { opacity: 1; }
  .pn-remove:hover { color: var(--t1); }
  .hrow { display: flex; align-items: baseline; gap: 8px; padding: 5px 10px 5px 20px; border-radius: var(--r1); cursor: pointer; }
  .hrow:hover { background: var(--raised); }
  .hrow.active { background: var(--raised); }
  .hrow .g { flex: 1; min-width: 0; color: var(--t2); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hrow:hover .g { color: var(--t1); }
  .hrow.active .g { color: var(--t1); font-weight: 600; }
  .hrow.blocked .g { color: var(--t1); }
  .hrow.open .g { color: var(--t3); }
  .hrow.running .g { color: var(--t1); }
  .hrow.running .t { color: var(--t2); animation: gm-pulse 1.6s ease-in-out infinite; }
  @keyframes gm-pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
  .hrow .t { flex: none; color: var(--t4); font-size: 11px; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .expand { padding: 4px 10px 4px 20px; color: var(--t4); font-size: 11.5px; cursor: pointer; }
  .expand:hover { color: var(--t2); }
  .side-empty { color: var(--t4); font-size: 12px; line-height: 1.7; padding: 10px 16px; }

  .content { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; }
  .content[hidden] { display: none; }

  /* —— 项目主页 —— */
  #home { flex: 1; overflow-y: auto; overflow-anchor: none; padding: 40px 44px; }
  #home[hidden] { display: none; }
  .welcome { max-width: 520px; margin: 18vh auto 0; text-align: center; }
  .welcome h1 { font-size: 20px; font-weight: 600; letter-spacing: .2px; margin: 0 0 10px; }
  .welcome p { color: var(--t3); font-size: 13px; line-height: 1.7; margin: 0; }
  .ph { max-width: 640px; margin: 0 auto; }
  .ph h1 { font-size: 22px; font-weight: 600; letter-spacing: -.01em; margin: 0 0 4px; }
  .ph .pp { color: var(--t4); font-size: 11.5px; font-family: var(--mono); margin-bottom: 22px; word-break: break-all; }
  .ph .actions { display: flex; gap: 10px; margin-bottom: 34px; }
  /* Codex 按钮：药丸形，primary 实色，active 下沉 1px */
  #btnLoop { background: var(--t1); color: var(--bg); border: 0; border-radius: var(--pill); padding: 11px 24px; font-size: 13.5px; font-weight: 500; }
  #btnLoop:hover { opacity: .88; }
  #btnLoop:active { transform: translateY(1px); }
  #btnLive { background: transparent; color: var(--t2); border: 1px solid var(--line); border-radius: var(--pill); padding: 11px 20px; font-size: 13.5px; font-weight: 500; }
  #btnLive:hover { color: var(--t1); border-color: var(--t3); background: var(--raised); }
  #btnLive:active { transform: translateY(1px); }
  .ph .hint { color: var(--t4); font-size: 11.5px; margin: -24px 0 30px; }
  .hist-h { color: var(--t3); font-size: 11px; font-weight: 600; letter-spacing: .5px; margin-bottom: 10px; display: flex; justify-content: space-between; }
  .hist-h .pend { color: var(--t4); font-weight: 400; }
  .hist { display: flex; flex-direction: column; gap: 6px; }
  .h-item { display: flex; align-items: baseline; gap: 10px; background: var(--panel); border: 1px solid var(--line-soft); border-radius: var(--r1); padding: 11px 14px;
            transition: transform var(--motion) var(--ease), box-shadow var(--motion) var(--ease); }
  .h-item:hover { transform: translateY(-2px); box-shadow: var(--elev-hover); }
  .h-item .st { flex: none; font-size: 12px; color: var(--t2); }
  .h-item.blocked .st { color: var(--t1); }
  .h-item.open .st, .h-item.open .g { color: var(--t3); }
  .h-item.running .st { color: var(--t1); animation: gm-pulse 1.6s ease-in-out infinite; }
  .h-item.running .t { color: var(--t2); }
  .h-item .g { flex: 1; min-width: 0; color: var(--t1); font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .h-item .t { flex: none; color: var(--t4); font-size: 11px; font-variant-numeric: tabular-nums; }
  .hist-empty { color: var(--t4); font-size: 12.5px; line-height: 1.7; }

  /* —— 大任务队列：一条记录就是一个独立 prompt，可暂停、续跑、人工处理异常 —— */
  .batch-section { margin: 0 0 30px; }
  .batch-h { display: flex; align-items: center; justify-content: space-between; color: var(--t3); font-size: 11px; font-weight: 600; letter-spacing: .5px; margin-bottom: 10px; }
  .batch-h button, .batch-btn { background: transparent; color: var(--t2); border: 1px solid var(--line); border-radius: var(--pill); padding: 5px 11px; font-size: 11.5px; }
  .batch-h button:hover, .batch-btn:hover { color: var(--t1); border-color: var(--t3); background: var(--raised); }
  .batch-btn.danger:hover { color: #ff8b8b; border-color: rgba(255,107,107,.5); }
  .batch-create { display: grid; gap: 10px; background: var(--panel); border: 1px solid var(--line); border-radius: var(--r2); padding: 14px; margin-bottom: 10px; }
  .batch-create[hidden] { display: none; }
  .batch-create input[type="text"], .batch-create input[type="number"], .batch-create textarea, .batch-create select { width: 100%; color: var(--t1); background: var(--input); border: 1px solid var(--line); border-radius: var(--r1); padding: 8px 10px; font: 12px/1.55 var(--sans); outline: none; }
  .batch-create textarea { resize: vertical; min-height: 66px; }
  .batch-create #queueItems { min-height: 104px; font-family: var(--mono); font-size: 11.5px; }
  .batch-create input:focus, .batch-create textarea:focus, .batch-create select:focus { border-color: var(--t3); }
  .batch-create label { display: grid; gap: 5px; color: var(--t3); font-size: 11.5px; }
  .batch-create .batch-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .batch-create .batch-check { display: flex; align-items: center; gap: 7px; color: var(--t2); }
  .batch-create .batch-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .batch-create .batch-error { color: #ff8b8b; font-size: 11.5px; min-height: 0; }
  .batch-list { display: flex; flex-direction: column; gap: 8px; }
  .batch-empty { color: var(--t4); font-size: 12px; }
  .batch-card { background: var(--panel); border: 1px solid var(--line-soft); border-radius: var(--r2); padding: 12px 14px; }
  .batch-card.running, .batch-card.needs_attention { border-color: var(--line); }
  .batch-top { display: flex; align-items: baseline; gap: 10px; }
  .batch-title { flex: 1; min-width: 0; color: var(--t1); font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .batch-state { color: var(--t3); font-size: 11px; white-space: nowrap; }
  .batch-state.running { color: var(--t1); }
  .batch-meta { display: flex; flex-wrap: wrap; gap: 7px 14px; color: var(--t4); font-size: 11px; margin: 7px 0 8px; }
  .batch-progress { height: 4px; background: var(--line); border-radius: var(--pill); overflow: hidden; }
  .batch-progress i { display: block; height: 100%; background: var(--t2); border-radius: var(--pill); transition: width .35s var(--ease); }
  .batch-controls { display: flex; flex-wrap: wrap; align-items: center; gap: 7px; margin-top: 10px; }
  .batch-controls .parallel { display: flex; align-items: center; gap: 5px; margin-left: auto; color: var(--t3); font-size: 11px; }
  .batch-controls select { color: var(--t2); background: var(--input); border: 1px solid var(--line); border-radius: var(--r1); padding: 4px 5px; font-size: 11px; }
  .batch-detail { border-top: 1px solid var(--line-soft); margin-top: 10px; padding-top: 8px; display: flex; flex-direction: column; gap: 5px; }
  .batch-item { display: flex; align-items: center; gap: 8px; color: var(--t3); font-size: 11.5px; padding: 5px 0; }
  .batch-item .item-key { flex: 1; min-width: 0; color: var(--t2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .batch-item .item-status { flex: none; color: var(--t4); }
  .batch-item.blocked .item-status { color: #ff8b8b; }
  .batch-item.verified .item-status { color: var(--t2); }
  .batch-item .batch-btn { padding: 3px 8px; font-size: 10.5px; }
  .batch-more { color: var(--t4); font-size: 11px; padding-top: 4px; }

  /* —— 运行视图 —— */
  /* 中间分隔可拖拽：执行端占 1fr，把关端默认窄一点（--sup-w，可拖、记忆） */
  #runView { flex: 1; display: grid; grid-template-columns: 1fr 6px var(--sup-w, 34%); min-height: 0; background: var(--panel); }
  #runView[hidden] { display: none; }
  .pane { display: flex; flex-direction: column; min-height: 0; min-width: 0; }
  #paneDrag { cursor: col-resize; background: var(--line); position: relative; }
  #paneDrag::before { content: ""; position: absolute; inset: 0 -4px; }
  #paneDrag:hover, #paneDrag.dragging { background: var(--t3); }
  body.resizing-panes { cursor: col-resize; user-select: none; }
  .pane > .label { color: var(--t3); font-size: 11px; font-weight: 500; letter-spacing: .4px; padding: 11px 18px 10px; border-bottom: 1px solid var(--line-soft); }
  /* 终端容器：Codex 式干净卡面，圆角内嵌，留白呼吸 */
  .term-wrap { flex: 1; min-height: 0; min-width: 0; position: relative; padding: 12px 14px; }
  #term { position: absolute; inset: 12px 14px; overflow: hidden; background: var(--bg); border-radius: var(--r1); }
  #term[hidden] { display: none; }
  .xterm, .xterm-viewport { background: transparent !important; }
  /* 启动遮罩：把 pi 冷启动那坨噪音藏在优雅的加载态后面，就绪后淡出露出干净提示符 */
  .term-boot { position: absolute; inset: 12px 14px; background: var(--bg); border-radius: var(--r1);
               display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
               transition: opacity var(--motion) var(--ease); pointer-events: none; }
  .term-boot[hidden] { display: none; }
  .term-boot.fading { opacity: 0; }
  .boot-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--t2); animation: gm-breathe 1.4s ease-in-out infinite; }
  @keyframes gm-breathe { 0%,100% { opacity: .3; transform: scale(.8); } 50% { opacity: 1; transform: scale(1.15); } }
  .boot-title { color: var(--t2); font-size: 14px; font-weight: 500; letter-spacing: .2px; }
  .boot-sub { color: var(--t4); font-size: 11.5px; font-family: var(--mono); max-width: 80%; text-align: center;
              white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .feed { flex: 1; overflow-y: auto; overflow-anchor: none; padding: 16px 18px; display: flex; flex-direction: column; gap: 13px; }
  .feed .empty { color: var(--t4); font-size: 12.5px; margin: auto 0; line-height: 1.6; }
  .msg { color: var(--t1); font-size: 13px; line-height: 1.68; white-space: pre-wrap; word-break: break-word; }
  .act { align-self: flex-start; color: var(--t3); font-family: var(--mono); font-size: 11.5px; letter-spacing: .2px;
         background: var(--raised); border: 1px solid var(--line-soft); border-radius: var(--r1); padding: 3px 9px; }
  .suggest { color: var(--t1); font-size: 13px; line-height: 1.62; background: var(--raised); border: 1px solid var(--line);
             border-left: 2px solid var(--t2); border-radius: var(--r2); padding: 11px 13px; }
  .suggest b { display: block; color: var(--t3); font-size: 10.5px; font-weight: 600; letter-spacing: .6px; text-transform: uppercase; margin-bottom: 5px; }
  .thinking-card { color: var(--t2); font-size: 12px; line-height: 1.55; background: var(--raised); border: 1px solid var(--line);
                   border-radius: var(--r2); overflow: hidden; flex: 0 0 auto; }
  .thinking-card > summary { cursor: pointer; padding: 9px 12px; color: var(--t1); font-size: 12.5px; font-weight: 550;
                             list-style: none; display: flex; align-items: center; gap: 7px; }
  .thinking-card > summary::-webkit-details-marker { display: none; }
  .thinking-card > summary::before { content: "›"; color: var(--t4); font-size: 17px; transform-origin: center; transition: transform var(--motion) var(--ease); }
  .thinking-card[open] > summary::before { transform: rotate(90deg); }
  .thinking-card .tc-body { border-top: 1px solid var(--line-soft); padding: 10px 12px 12px; display: grid; gap: 9px; }
  .thinking-card .tc-row b { display: block; color: var(--t4); font-size: 9.5px; letter-spacing: .55px; text-transform: uppercase; margin-bottom: 2px; }
  .thinking-card .tc-reason { color: var(--t1); border-left: 2px solid var(--t2); padding-left: 8px; }
  .thinking-card .tc-list { margin: 3px 0 0; padding-left: 17px; }
  .thinking-card .tc-list li { margin: 3px 0; }
  .thinking-card.approved > summary { color: var(--t1); }
  .thinking-card.rejected > summary, .thinking-card.blocked > summary { color: var(--t2); }
  .rule { border: 0; border-top: 1px solid var(--line-soft); margin: 4px 0 1px; }

  /* —— 队列 + 状态 —— */
  .queue { display: flex; gap: 8px; align-items: center; padding: 10px 18px; border-top: 1px solid var(--line); background: var(--panel); overflow-x: auto; }
  .queue[hidden] { display: none; }
  .queue .qlabel { color: var(--t3); font-size: 10.5px; font-weight: 500; letter-spacing: .5px; white-space: nowrap; margin-right: 4px; }
  #qitems { display: flex; gap: 7px; }
  .qitem { font-size: 12px; white-space: nowrap; max-width: 480px; overflow: hidden; text-overflow: ellipsis;
           padding: 4px 10px; border-radius: 999px; border: 1px solid var(--line); color: var(--t3); }
  .qitem.done { color: var(--bg); background: var(--t1); border-color: var(--t1); font-weight: 500; }
  .qitem.blocked { color: var(--t1); border-color: var(--t2); }
  .status { display: flex; align-items: center; gap: 14px; padding: 11px 18px; border-top: 1px solid var(--line); background: var(--panel); color: var(--t3); font-size: 12px; }
  .status[hidden] { display: none; }
  .bar { width: 168px; height: 4px; background: var(--line); border-radius: 999px; overflow: hidden; }
  .bar > i { display: block; height: 100%; width: 0; background: var(--t2); border-radius: 999px; transition: width .5s ease; }
  #progress { color: var(--t2); font-variant-numeric: tabular-nums; }
  #contextUsage { color: var(--t4); font-family: var(--mono); font-size: 11px; }
  .gate { margin-left: auto; color: var(--t3); font-size: 12px; }
  .gate.pass { background: var(--t1); color: var(--bg); padding: 4px 11px; border-radius: 999px; font-weight: 600; }

  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 999px; border: 2px solid var(--panel); }
  ::-webkit-scrollbar-thumb:hover { background: var(--t4); }
</style>
</head>
<body>
  <div class="top">
    <span class="brand"><span class="brand-mark"><img class="logo-dark" src="arova-logo-dark.svg" alt="Arova" /><img class="logo-light" src="arova-logo.svg" alt="" /></span><span class="tagline">Follow the thread.</span><span class="cwd" id="cwd"></span><span class="rechoose" id="rechoose" hidden>结束，回项目</span></span>
    <span class="top-right">
      <button id="newThreadBtn" title="新建一场独立会话，当前任务继续运行">＋ 新会话</button>
      <span class="life" id="life">选个项目开始</span>
      <button id="themeBtn" title="切换主题">◐</button>
    </span>
  </div>

  <div class="shell">
    <aside class="side">
      <div class="side-h"><span>项目</span><button id="addProj" title="添加项目">＋</button></div>
      <div id="addRow" hidden><input id="addPath" placeholder="/项目文件夹路径，回车确认" /></div>
      <div id="projList"></div>
    </aside>

    <section class="content" id="mainContent">
      <div id="home">
        <div class="welcome" id="welcome">
          <h1>想让 AI 帮你干点什么？</h1>
          <p>左边加一个项目文件夹，AI 就能在里面干活——<br>自己找活干，或者陪你一起干。</p>
        </div>
        <div class="ph" id="projHome" hidden>
          <h1 id="projName"></h1>
          <div class="pp" id="projPath"></div>
          <div class="actions">
            <button id="btnLoop">让它自己干</button>
            <button id="btnLive">我自己来</button>
          </div>
          <div class="hint">让它自己干 — 自己找活、做、检查，做完给你过目　·　我自己来 — 你亲自上，AI 在旁边把关</div>
          <section class="batch-section">
            <div class="batch-h"><span>批处理队列</span><button id="newQueueBtn">＋ 新建队列</button></div>
            <div class="batch-create" id="queueCreate" hidden>
              <label>队列名称<input type="text" id="queueTitle" placeholder="例如：逐条核对产品数据" /></label>
              <label>这一批最终要达到什么结果<textarea id="queueGoal" placeholder="写清完成标准；每一条都会带着这个目标独立执行。"></textarea></label>
              <label>每条记录怎么处理<textarea id="queuePrompt" placeholder="例如：核对当前记录所有字段，只用可追溯来源；需要写回时必须读后校验。"></textarea></label>
              <label>待处理记录<textarea id="queueItems" placeholder="每行一条记录；或粘贴 JSON 数组（对象会完整保留）。"></textarea></label>
              <div class="batch-options">
                <label>AI 复核
                  <select id="queueReview"><option value="when_needed">有疑点时复核</option><option value="always">每条都复核</option><option value="never">不做语义复核</option></select>
                </label>
                <label>最大并发
                  <select id="queueConcurrency"><option value="2">2 个子会话</option><option value="3">3 个子会话</option><option value="4">4 个子会话</option></select>
                </label>
              </div>
              <div class="batch-options">
                <label>语义重做预算
                  <input type="number" id="queueSemanticRedos" min="0" step="1" value="1" title="结构或证据不达标时，每条自动重做几次" />
                </label>
                <label>瞬时错误重试预算
                  <input type="number" id="queueTransientRetries" min="0" step="1" value="4" title="网络/5xx 等错误的每条重试次数；429 不消耗此预算" />
                </label>
              </div>
              <label>单条超时（分钟，0 表示不限时）
                <input type="number" id="queueItemTimeoutMinutes" min="0" step="1" value="0" />
              </label>
              <label class="batch-check"><input type="checkbox" id="queueParallel" /> 启用并行子会话（遇到 429 会自动降到 1）</label>
              <div class="batch-error" id="queueCreateError"></div>
              <div class="batch-actions"><button class="batch-btn" id="queueCreateCancel">取消</button><button class="batch-btn" id="queueCreateSubmit">创建队列</button></div>
            </div>
            <div class="batch-list" id="projectQueues"></div>
          </section>
          <div class="hist-h"><span>干过的活</span><span class="pend" id="pendCount"></span></div>
          <div class="hist" id="histList"></div>
        </div>
      </div>

      <main id="runView" hidden>
        <section class="pane">
          <div class="label" id="execLabel">AI 在干活 · 你随时能插手</div>
          <div class="term-wrap">
            <div id="term" hidden></div>
            <div id="termBoot" class="term-boot" hidden>
              <div class="boot-dot"></div>
              <div class="boot-title">正在唤起 pi</div>
              <div class="boot-sub" id="bootSub"></div>
            </div>
          </div>
        </section>
        <div id="paneDrag" title="拖动调整宽度"></div>
        <section class="pane">
          <div class="label">把关 · 帮你盯着，只看不动手</div>
          <div class="feed" id="supFeed"></div>
        </section>
      </main>

      <div class="queue" id="queue" hidden>
        <span class="qlabel">要干的 · 卡住的</span>
        <span id="qitems"></span>
      </div>

      <div class="status" id="statusBar" hidden>
        <div class="bar"><i id="barfill"></i></div>
        <span id="progress">—</span>
        <span id="contextUsage"></span>
        <span class="gate" id="gate">还在核对</span>
      </div>
    </section>
    <div class="thread-frames" id="threadFrames"></div>
  </div>

  <script src="/vendor/xterm.js"></script>
  <script src="/vendor/addon-fit.js"></script>
  <script src="app.js"></script>
</body>
</html>
